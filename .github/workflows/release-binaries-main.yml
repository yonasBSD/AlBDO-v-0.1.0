name: Release Binaries (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binaries-main
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive="albedo-binaries-${{ runner.os }}-${{ runner.arch }}.tar.gz"
          tar -czf "$archive" \
            target/release/albedo \
            target/release/dom-compiler \
            target/release/albedo-bench
          echo "RELEASE_ASSET=$archive" >> "$GITHUB_ENV"

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "albedo-binaries-${{ runner.os }}-${{ runner.arch }}.zip"
          Compress-Archive -Path `
            target/release/albedo.exe, `
            target/release/dom-compiler.exe, `
            target/release/albedo-bench.exe `
            -DestinationPath $archive -Force
          "RELEASE_ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish packaged binary to rolling release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "main-latest"
          $repo = "${{ github.repository }}"
          $title = "Main Branch Binaries"
          $notes = "Automated rolling binary release from the main branch.`nCommit: ${{ github.sha }}"

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --title $title --notes $notes --prerelease --target "${{ github.sha }}"
            if ($LASTEXITCODE -ne 0) {
              # Another matrix job may have created the release first.
              gh release view $tag --repo $repo *> $null
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to create or locate release '$tag'."
              }
            }
          } else {
            gh release edit $tag --repo $repo --title $title --notes $notes --prerelease --target "${{ github.sha }}"
          }

          gh release upload $tag "$env:RELEASE_ASSET" --repo $repo --clobber
